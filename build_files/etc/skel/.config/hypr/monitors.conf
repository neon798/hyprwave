# Hyprwave monitor configuration
# Reference: https://wiki.hyprland.org/Configuring/Monitors/
#
# Syntax: monitor = NAME, RESOLUTION@HZ, POSITION, SCALE
# Find your monitor names + available modes with:  hyprctl monitors all
#
# Default: auto-detect every connected monitor at its preferred mode.
monitor = , preferred, auto, 1

# --- Examples (uncomment + edit to taste) ------------------------------------
#
# Single 1440p @ 144Hz, no scaling:
# monitor = DP-1, 2560x1440@144, 0x0, 1
#
# HiDPI laptop panel at 1.5x scale:
# monitor = eDP-1, 2880x1800@90, 0x0, 1.5
#
# Dual monitors side by side (left then right of it):
# monitor = DP-1, 2560x1440@144, 0x0, 1
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1
#
# Mirror HDMI onto the laptop panel:
# monitor = HDMI-A-1, preferred, auto, 1, mirror, eDP-1
#
# Disable a monitor entirely:
# monitor = HDMI-A-1, disable
