# Hyprwave window rules
# Reference: https://wiki.hyprland.org/Configuring/Window-Rules/

# --- Float + center common dialogs / tray apps -------------------------------
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(org.pulseaudio.pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(\.blueman-manager-wrapped)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float, class:^(polkit-kde-authentication-agent-1)$

windowrule = center, class:^(pavucontrol)$
windowrule = center, class:^(org.pulseaudio.pavucontrol)$
windowrule = center, class:^(blueman-manager)$
windowrule = center, class:^(nm-connection-editor)$
windowrule = size 800 600, class:^(pavucontrol)$
windowrule = size 800 600, class:^(org.pulseaudio.pavucontrol)$

# Portal file-chooser / open-save dialogs
windowrule = float, title:^(Open File)(.*)$
windowrule = float, title:^(Save File)(.*)$
windowrule = float, title:^(Save As)(.*)$
windowrule = float, title:^(Choose Files)(.*)$
windowrule = center, title:^(Open File)(.*)$
windowrule = center, title:^(Save File)(.*)$

# --- Synthwave translucency on terminals -------------------------------------
windowrule = opacity 0.92 0.85, class:^(com.mitchellh.ghostty)$

# --- Suppress maximize events and dim inactive -------------------------------
windowrule = suppressevent maximize, class:.*

# --- Per-app workspace assignments (examples; edit to taste) -----------------
