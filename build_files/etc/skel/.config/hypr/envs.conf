env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = MOZ_ENABLE_WAYLAND,1
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24

# Default browser for apps that honour $BROWSER (Neonwolf — see mimeapps.list too)
env = BROWSER,neonwolf

# Prefer dark theme for GTK apps (libadwaita honors the color-scheme hint)
env = GTK_THEME,Adwaita:dark
# Qt synthwave theming (qt5ct/qt6ct or Kvantum) is deferred to the Phase B
# package work; uncomment once the platform theme package ships:
# env = QT_QPA_PLATFORMTHEME,qt6ct
